name: Fuzz

on:
  workflow_dispatch:

jobs:
  fuzz:
    name: Fuzz Parser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Fuzz parser
        run: moon run parser:fuzz

      - uses: appthrust/moon-ci-retrospect@v1
        if: success() || failure()

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes
          path: |
            parser/hfuzz_workspace/
