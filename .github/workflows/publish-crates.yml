# NOTE: Hand-authored. TODO: Generate from Moon Tera templates (.moon/templates/publish-workflows/)
name: Publish slash-rust to crates.io

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., slash-rust-v1.0.0)"
        required: true

jobs:
  publish:
    if: >-
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'slash-rust-v'))
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: publish
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Publish to crates.io
        run: moon run slash-rust:publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
