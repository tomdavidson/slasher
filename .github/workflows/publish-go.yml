# NOTE: Hand-authored. TODO: Generate from Moon Tera templates (.moon/templates/publish-workflows/)
name: Validate slash-go

on:
  release:
    types: [published]

jobs:
  validate:
    if: startsWith(github.event.release.tag_name, 'slash-go/')
    runs-on: ubuntu-latest
    environment: publish
    steps:
      - uses: actions/checkout@v4

      - uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Validate Go module
        run: moon run slash-go:build
