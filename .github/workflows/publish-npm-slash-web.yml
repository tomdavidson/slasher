# NOTE: Hand-authored. TODO: Generate from Moon Tera templates (.moon/templates/publish-workflows/)
name: Publish @slasher/slash-web

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., slash-web-v1.0.0)"
        required: true

jobs:
  publish:
    if: >-
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'slash-web-v'))
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: publish
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Build
        run: moon run slash-web:build

      - name: Publish to npm
        run: moon run slash-web:publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
