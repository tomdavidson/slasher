# NOTE: Hand-authored. TODO: Generate from Moon Tera templates (.moon/templates/publish-workflows/)
name: Publish slash-python to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., slash-python-v1.0.0)"
        required: true

jobs:
  publish:
    if: >-
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'slash-python-v'))
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: publish
    steps:
      - uses: actions/checkout@v4

      - uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Build
        run: moon run slash-python:build

      - name: Publish to PyPI
        run: moon run slash-python:publish
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
