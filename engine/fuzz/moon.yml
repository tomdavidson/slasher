# engine/fuzz/moon.yml
$schema: "https://moonrepo.dev/schemas/project.json"
id: "engine-fuzz"
language: "rust"
tags: ["fuzz"]

dependsOn:
  - "engine-fuzz-common"
  - "engine"

project: 
  metadata:
    regressions-path: "regressions"
    corpus-path: "corpus"

workspace:
  inheritedTasks:
    include: []

# engine/fuzz/moon.yml

tasks:
  # ---------------------------------------------------------
  # High-Level Meta Tasks
  # ---------------------------------------------------------
  
  fuzz:
    command: noop
    deps:
      - ~:libfuzz-structured
      - ~:libfuzz-unstructured
    options:
      runInCI: true

  fuzz-ci:
    command: noop
    deps:
      - ~:fuzz-saturate
      - ~:fuzz-gate
    options:
      runDepsInParallel: false

  fuzz-saturate:
    command: noop
    deps:
      - ~:fuzz-unstructured-saturate
      - ~:fuzz-structured-saturate

  fuzz-triage:
    script: |
      bash fuzz-manage.sh triage parse_document_unstructured
      bash fuzz-manage.sh triage parse_document_structured
    options:
      cache: false

  fuzz-gate:
    script: |
      shopt -s nullglob
      summaries=(artifacts/*/crash-summary.txt)
      if [ ${#summaries[@]} -eq 0 ]; then
        echo "No new crashes across all targets."
        exit 0
      fi
      for f in "${summaries[@]}"; do
        cat "$f"
        echo ""
      done
      echo "Triage with: moon run engine-fuzz:fuzz-triage"
      exit 1
    options:
      cache: false

  # ---------------------------------------------------------
  # Saturation Tasks (Run fuzzers and compact)
  # ---------------------------------------------------------

  fuzz-structured-saturate:
    script: bash fuzz-manage.sh compact parse_document_structured
    deps:
      - ~:libfuzz-structured-saturate
      - ~:libafl-structured-saturate

  fuzz-unstructured-saturate:
    script: bash fuzz-manage.sh compact parse_document_unstructured
    deps:
      - ~:libfuzz-unstructured-saturate
      - ~:libafl-unstructured-saturate

  # ---------------------------------------------------------
  # Individual Saturation Executions
  #
  # Defaults: FUZZ_MAXTIME=14400 (4h), FUZZ_JOBS=2
  # CI overrides via env: FUZZ_MAXTIME=18000 FUZZ_JOBS=4
  # Local override: FUZZ_MAXTIME=3600 FUZZ_JOBS=2 moon run ...
  # ---------------------------------------------------------

  libfuzz-structured-saturate:
    command: bash fuzz-run.sh parse_document_structured
    env:
      FUZZ_MAXTIME: "14400"
      FUZZ_JOBS: "2"
    options:
      cache: false

  libafl-structured-saturate:
    command: bash fuzz-run.sh parse_document_structured
    env:
      FUZZ_MAXTIME: "14400"
      FUZZ_JOBS: "2"
      FUZZ_FEATURES: "--no-default-features --features libafl"
    options:
      cache: false

  libfuzz-unstructured-saturate:
    command: bash fuzz-run.sh parse_document_unstructured
    env:
      FUZZ_MAXTIME: "14400"
      FUZZ_JOBS: "2"
    options:
      cache: false

  libafl-unstructured-saturate:
    command: bash fuzz-run.sh parse_document_unstructured
    env:
      FUZZ_MAXTIME: "14400"
      FUZZ_JOBS: "2"
      FUZZ_FEATURES: "--no-default-features --features libafl"
    options:
      cache: false

  # ---------------------------------------------------------
  # CI Integration Tasks (Fast PR check using existing corpus)
  #
  # LibAFL does not support corpus-only replay (-runs=0). Its value
  # is in long-running saturation, not quick CI checks. Minimized
  # crashes are already covered by the cargo test regression suite.
  # ---------------------------------------------------------

  libfuzz-structured:
    command: bash fuzz-run.sh parse_document_structured --replay
    env:
      FUZZ_MAXTIME: "10"
      FUZZ_JOBS: "2"
    options:
      cache: false

  libfuzz-unstructured:
    command: bash fuzz-run.sh parse_document_unstructured --replay
    env:
      FUZZ_MAXTIME: "10"
      FUZZ_JOBS: "2"
    options:
      cache: false

